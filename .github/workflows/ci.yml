# ============================================================================
# CI/CD — IBM watsonx Startup Blueprint Generator
# ============================================================================
#
# Runs on every push to main / pull request:
#   1. Install dependencies
#   2. TypeScript type-check (tsc --noEmit)
#   3. Run unit tests
#   4. Build the project (tsc)
#
# For deployment, see the "Deploy" section below.
# Uncomment the "Deploy to Render" step and add RENDER_DEPLOY_HOOK_URL
# to your repository secrets (Settings → Secrets → Actions).
# ============================================================================

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: startup-blueprint-agent/package-lock.json

      - name: Install dependencies
        working-directory: startup-blueprint-agent
        run: npm ci

      - name: TypeScript type-check
        working-directory: startup-blueprint-agent
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: startup-blueprint-agent
        run: npm test

      - name: Build
        working-directory: startup-blueprint-agent
        run: npm run build

